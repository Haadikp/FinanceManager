{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div class="auth-wrapper" style="justify-content:center;align-items:center;">
  <div style="max-width:400px;width:100%;padding:24px;">
    <div class="pfms-card">
      <div class="card-body" style="padding:32px;text-align:center;">
        <div style="font-size:52px;margin-bottom:16px;">🔑</div>
        <h3 style="font-weight:800;color:var(--text-primary);margin-bottom:18px;">Reset Password</h3>
        <form method="POST" action="/reset">
          <div style="text-align:left;margin-bottom:20px;">
            <label class="pfms-label">Registered Email</label>
            <input type="email" name="femail" class="pfms-input" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn-accent w-100" style="justify-content:center;padding:12px;">
            <i class="bi bi-send-fill"></i> Send OTP
          </button>
        </form>
        <p style="margin-top:20px;font-size:13px;color:var(--text-secondary);">
          <a href="/" style="color:var(--accent);font-weight:600;text-decoration:none;">← Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
